site_name: Card Kiosk Core documentation
site_url: https://USERNAME.github.io/project-docs/

theme:
  name: mkdocs
  highlightjs: true
  color_mode: dark
  user_color_mode_toggle: true
  hljs_languages:
    - yaml
    - csharp
    - json

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

nav:
  - Главная: index.md